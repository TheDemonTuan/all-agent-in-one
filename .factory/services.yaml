commands:
  install: bun install
  dev: bun run dev
  build: bun run build
  electron:start: bun run electron:start
  test: bun run test
  test:coverage: bun run test --coverage
  test:e2e: bun run test:e2e
  lint: bun run lint
  typecheck: bun run typecheck

services:
  vite:
    start: bun run dev
    stop: echo "Vite will stop when terminal closes"
    healthcheck: curl -sf http://localhost:5173 || exit 1
    port: 5173
    depends_on: []

  electron:
    start: bun run electron:start
    stop: echo "Electron will stop when app closes"
    healthcheck: echo "Electron health check not implemented"
    port: null
    depends_on: [vite]
