name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install Dependencies
        run: bun install
      
      - name: Type Check
        run: bun run build
      
      - name: Build Electron
        run: bun run build:electron
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TDT-Space-build
          path: |
            dist/
            dist-electron/
          retention-days: 7
